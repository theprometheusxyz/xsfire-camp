name: NPM Org Diagnostics

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    name: Diagnose npm org/package access
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify secret is configured
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NPM_TOKEN:-}" ]; then
            echo "NPM_TOKEN is not configured."
            exit 1
          fi

      - name: Configure npm auth
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cat > "$HOME/.npmrc" <<EOF
          //registry.npmjs.org/:_authToken=${NPM_TOKEN}
          registry=https://registry.npmjs.org/
          always-auth=true
          EOF

      - name: Print auth identity
        run: |
          npm ping
          npm whoami

      - name: Inspect org and team visibility
        run: |
          echo "== npm org ls theprometheusxyz =="
          npm org ls theprometheusxyz --json || true
          echo
          echo "== npm team ls @theprometheusxyz =="
          npm team ls @theprometheusxyz || true

      - name: Inspect package access for failing package
        run: |
          echo "== npm access get status @theprometheusxyz/xsfire-camp-darwin-arm64 =="
          npm access get status @theprometheusxyz/xsfire-camp-darwin-arm64 || true
          echo
          echo "== npm access list collaborators @theprometheusxyz/xsfire-camp-darwin-arm64 =="
          npm access list collaborators @theprometheusxyz/xsfire-camp-darwin-arm64 --json || true
          echo
          echo "== npm access list packages @theprometheusxyz =="
          npm access list packages @theprometheusxyz --json || true
          echo
          echo "== npm view @theprometheusxyz/xsfire-camp-darwin-arm64 =="
          npm view @theprometheusxyz/xsfire-camp-darwin-arm64 --json || true
