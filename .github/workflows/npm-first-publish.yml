name: NPM First Publish Probe

on:
  push:
    branches:
      - codex/npm-first-publish
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-base:
    name: Publish base npm package once
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify npm token
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NPM_TOKEN:-}" ]; then
            echo "NPM_TOKEN is not configured."
            exit 1
          fi

      - name: Configure npm auth
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cat > "$HOME/.npmrc" <<EOF
          //registry.npmjs.org/:_authToken=${NPM_TOKEN}
          registry=https://registry.npmjs.org/
          always-auth=true
          EOF

      - name: Print target package
        run: |
          node -p "require('./npm/package.json').name"
          node -p "require('./npm/package.json').version"

      - name: Validate publish payload
        working-directory: npm
        run: |
          npm publish --access public --dry-run

      - name: Publish base package
        working-directory: npm
        run: |
          npm publish --access public

      - name: Verify published package
        run: |
          npm view @theprometheusxyz/xsfire-camp version
